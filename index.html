<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <title>Password Protected</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔒</text></svg>">
    <style>
        :root {
            /* Colors */
            --bg: hsl(220 13% 95%);
            --card: hsl(0 0% 100%);
            --border: hsl(214 32% 91%);
            --text: hsl(222 84% 5%);
            --muted: hsl(215 16% 47%);
            --primary: hsl(222 84% 5%);
            --primary-hover: hsl(222 84% 8%);
            --error-bg: hsl(0 86% 97%);
            --error-border: hsl(0 72% 91%);
            --error-text: hsl(0 84% 40%);

            /* Radius */
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;

            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --ring: 0 0 0 3px hsl(222 84% 95%);

            /* Spacing */
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-6: 1.5rem;
            --space-8: 2rem;

            /* Typography */
            --font-base: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto",
                "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans",
                "Helvetica Neue", sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            padding: var(--space-4);
            font-family: var(--font-base);
            font-size: 0.875rem;
            color: var(--text);
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Card */

        .card {
            width: 100%;
            max-width: 25rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        /* Alert */

        .alert {
            display: none;
            padding: var(--space-3) var(--space-4);
            background: var(--error-bg);
            color: var(--error-text);
            border-bottom: 1px solid var(--error-border);
            font-size: 0.875rem;
        }

        /* Content */

        .content {
            padding: var(--space-8);
            text-align: center;
        }

        .content svg {
            display: block;
            width: 2rem;
            margin: 0 auto var(--space-4);
            color: var(--primary);
        }

        .title {
            margin: 0 0 var(--space-2);
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.4;
            letter-spacing: -0.01em;
        }

        .description {
            margin: 0 0 var(--space-6);
            color: var(--muted);
            font-size: 0.875rem;
        }

        /* Input */

        .input {
            width: 100%;
            padding: 0.625rem 0.75rem;
            font-size: 0.875rem;
            font-family: inherit;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--card);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            margin-bottom: var(--space-4);
        }

        .input::placeholder {
            color: var(--muted);
        }

        .input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--ring);
        }

        /* Button */

        .button {
            width: 100%;
            padding: 0.625rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            font-family: inherit;
            border: none;
            border-radius: var(--radius-md);
            background: var(--primary);
            color: hsl(210 40% 98%);
            cursor: pointer;
            transition: background-color 0.15s ease, transform 0.05s ease;
        }

        .button:hover {
            background: var(--primary-hover);
        }

        .button:active {
            transform: translateY(1px);
        }
    </style>

</head>

<body>

    <div class="card">
        <div class="alert" data-id="alert">
            Incorrect password. Please try again.
        </div>

        <div class="content">
            <svg viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 4.63601C5 3.76031 5.24219 3.1054 5.64323 2.67357C6.03934 2.24705 6.64582 1.9783 7.5014 1.9783C8.35745 1.9783 8.96306 2.24652 9.35823 2.67208C9.75838 3.10299 10 3.75708 10 4.63325V5.99999H5V4.63601ZM4 5.99999V4.63601C4 3.58148 4.29339 2.65754 4.91049 1.99307C5.53252 1.32329 6.42675 0.978302 7.5014 0.978302C8.57583 0.978302 9.46952 1.32233 10.091 1.99162C10.7076 2.65557 11 3.57896 11 4.63325V5.99999H12C12.5523 5.99999 13 6.44771 13 6.99999V13C13 13.5523 12.5523 14 12 14H3C2.44772 14 2 13.5523 2 13V6.99999C2 6.44771 2.44772 5.99999 3 5.99999H4ZM3 6.99999H12V13H3V6.99999Z" fill="currentColor" fill-rule="evenodd" clip-rule="evenodd"></path>
            </svg>
            <h1 class="title">Password Required</h1>
            <p class="description">Enter your password to continue</p>

            <input class="input" data-id="password" type="password" placeholder="Enter password" />

            <button class="button" data-id="button" type="button">
                Continue
            </button>
        </div>
    </div>

    <script type="module">
        class PasswordGate {
            constructor() {
                this.elements = {
                    alert: document.querySelector('[data-id="alert"]'),
                    password: document.querySelector('[data-id="password"]'),
                    button: document.querySelector('[data-id="button"]')
                };

                this.init();
            }

            init() {
                this.elements.button.addEventListener('click', () => this.handleSubmit());
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        this.handleSubmit();
                    }
                });
            }

            async handleSubmit() {
                const password = this.elements.password.value;
                await this.login(password);
            }

            async hashPassword(password) {
                const encoder = new TextEncoder();
                const data = encoder.encode(password);
                const hashBuffer = await crypto.subtle.digest('SHA-1', data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }

            async login(password) {
                const hash = await this.hashPassword(password);
                const url = `${hash}/index.html`;

                try {
                    const response = await fetch(url);

                    if (response.status >= 200 && response.status < 400) {
                        window.location = url;
                    } else {
                        this.handleError(hash);
                    }
                } catch (error) {
                    this.handleError(hash);
                }
            }

            handleError(hash) {
                parent.location.hash = hash;
                this.elements.alert.style.display = 'block';
                this.elements.password.setAttribute('placeholder', 'Incorrect password');
                this.elements.password.value = '';
            }
        }

        new PasswordGate();
    </script>
</body>

</html>
